<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具库文档 — ICOCOER</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --accent: #4f6ef7;
            --sidebar-width: 260px;
            --bg: #f8f9fa;
            --sidebar-bg: #ffffff;
            --text: #24292e;
            --muted: #6b7280;
            --border: #e1e4e8;
            --code-bg: #f6f8fa;
        }

        body {
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }

        /* ── Sidebar ── */
        #sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header a {
            font-size: 0.8rem;
            color: var(--accent);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .sidebar-header a:hover { text-decoration: underline; }

        .sidebar-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            margin-top: 10px;
        }

        .sidebar-nav { padding: 12px 0; }

        .nav-group-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            padding: 12px 20px 6px;
        }

        .sidebar-nav a {
            display: block;
            padding: 7px 20px;
            font-size: 0.875rem;
            color: var(--text);
            text-decoration: none;
            border-left: 3px solid transparent;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }

        .sidebar-nav a:hover {
            background: #f0f2ff;
            color: var(--accent);
        }

        .sidebar-nav a.active {
            border-left-color: var(--accent);
            color: var(--accent);
            background: #f0f2ff;
            font-weight: 600;
        }

        /* ── Mobile sidebar toggle ── */
        #menu-toggle {
            display: none;
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 200;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 1.1rem;
            cursor: pointer;
        }

        /* ── Main content ── */
        #content-wrap {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 48px 56px;
            max-width: 860px;
        }

        /* ── Markdown styles ── */
        #markdown-body h1 { font-size: 1.9rem; margin-bottom: 12px; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        #markdown-body h2 { font-size: 1.4rem; margin: 36px 0 12px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
        #markdown-body h3 { font-size: 1.1rem; margin: 28px 0 8px; }
        #markdown-body p { line-height: 1.75; margin-bottom: 16px; }
        #markdown-body ul, #markdown-body ol { padding-left: 1.5em; margin-bottom: 16px; }
        #markdown-body li { line-height: 1.75; margin-bottom: 4px; }
        #markdown-body a { color: var(--accent); text-decoration: none; }
        #markdown-body a:hover { text-decoration: underline; }
        #markdown-body code {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 0.875em;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        }
        #markdown-body pre {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            overflow-x: auto;
            margin-bottom: 20px;
        }
        #markdown-body pre code {
            background: none;
            border: none;
            padding: 0;
            font-size: 0.875rem;
        }
        #markdown-body blockquote {
            border-left: 4px solid var(--accent);
            background: #f0f2ff;
            padding: 12px 16px;
            margin-bottom: 16px;
            border-radius: 0 6px 6px 0;
            color: var(--muted);
        }
        #markdown-body table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        #markdown-body th, #markdown-body td {
            border: 1px solid var(--border);
            padding: 8px 12px;
            text-align: left;
        }
        #markdown-body th { background: var(--code-bg); font-weight: 600; }
        #markdown-body tr:nth-child(even) { background: #fafafa; }
        #markdown-body hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

        .loading {
            color: var(--muted);
            font-size: 0.95rem;
            padding: 40px 0;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            #menu-toggle { display: block; }

            #sidebar {
                left: -100%;
                transition: left 0.25s ease;
                z-index: 100;
            }

            #sidebar.open { left: 0; }

            #content-wrap {
                margin-left: 0;
                padding: 64px 20px 40px;
            }
        }
    </style>
</head>
<body>

    <button id="menu-toggle" aria-label="Toggle menu" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>

    <nav id="sidebar">
        <div class="sidebar-header">
            <a href="index.html">← 返回首页</a>
            <div class="sidebar-title">📚 工具库文档</div>
        </div>
        <div class="sidebar-nav">
            <div class="nav-group-label">入门</div>
            <a href="#" data-doc="docs/index.md" class="nav-link active">简介</a>
            <a href="#" data-doc="docs/getting-started.md" class="nav-link">快速上手</a>

            <div class="nav-group-label">API 参考</div>
            <a href="#" data-doc="docs/api.md" class="nav-link">API 文档</a>

            <div class="nav-group-label">其他</div>
            <a href="#" data-doc="docs/changelog.md" class="nav-link">更新日志</a>
        </div>
    </nav>

    <div id="content-wrap">
        <div id="markdown-body">
            <p class="loading">加载中…</p>
        </div>
    </div>

    <!-- marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
    <script>
        const body = document.getElementById('markdown-body');

        async function loadDoc(path) {
            body.innerHTML = '<p class="loading">加载中…</p>';
            try {
                const res = await fetch(path);
                if (!res.ok) throw new Error('文件未找到');
                const md = await res.text();
                body.innerHTML = marked.parse(md);
            } catch (e) {
                body.innerHTML = '<p style="color:#e74c3c">⚠️ 无法加载文档：' + e.message + '</p>';
            }
            // Scroll to top
            window.scrollTo(0, 0);
        }

        function setActive(el) {
            document.querySelectorAll('.nav-link').forEach(a => a.classList.remove('active'));
            el.classList.add('active');
        }

        // Handle nav clicks
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', e => {
                e.preventDefault();
                const doc = link.dataset.doc;
                if (doc) {
                    setActive(link);
                    loadDoc(doc);
                    // Close sidebar on mobile
                    document.getElementById('sidebar').classList.remove('open');
                    // Update URL hash for shareability
                    history.pushState({ doc }, '', '#' + encodeURIComponent(doc));
                }
            });
        });

        // Load from URL hash on page load
        function loadFromHash() {
            const hash = decodeURIComponent(location.hash.slice(1));
            const matchedLink = hash
                ? document.querySelector(`.nav-link[data-doc="${hash}"]`)
                : document.querySelector('.nav-link[data-doc]');

            if (matchedLink) {
                setActive(matchedLink);
                loadDoc(matchedLink.dataset.doc);
            } else {
                const first = document.querySelector('.nav-link[data-doc]');
                if (first) { setActive(first); loadDoc(first.dataset.doc); }
            }
        }

        window.addEventListener('popstate', loadFromHash);
        loadFromHash();
    </script>
</body>
</html>
