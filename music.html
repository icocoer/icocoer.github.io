<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>听点音乐吧 — ICOCOER</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #333;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: #4f6ef7;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 32px;
        }

        .back-link:hover { text-decoration: underline; }

        header { text-align: center; margin-bottom: 40px; }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #2c3e50;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }

        p.subtitle { font-size: 1rem; color: #666; }

        .music-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .music-card {
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            width: 350px;
            height: 106px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .music-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.12);
        }

        iframe { display: block; }

        footer {
            text-align: center;
            margin-top: 50px;
            color: #888;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <a class="back-link" href="index.html">← 返回首页</a>

    <header>
        <h1>🎵 听点音乐吧</h1>
        <p class="subtitle">与音乐死磕，才能与音乐言和</p>
    </header>

    <div class="music-container">
        <div class="music-card">
            <iframe frameborder="no" border="0" marginwidth="0" marginheight="0" width="330" height="86"
                src="https://music.163.com/outchain/player?type=2&id=2725335189&auto=0&height=66"></iframe>
        </div>
        <div class="music-card">
            <iframe frameborder="no" border="0" marginwidth="0" marginheight="0" width="330" height="86"
                src="//music.163.com/outchain/player?type=2&id=1963526955&auto=0&height=66"></iframe>
        </div>
        <div class="music-card">
            <iframe frameborder="no" border="0" marginwidth="0" marginheight="0" width="330" height="86"
                src="//music.163.com/outchain/player?type=2&id=4937707&auto=0&height=66"></iframe>
        </div>
    </div>

    <footer>
        Hosted with ❤️ by ICOCOER
    </footer>

    <script>
        var lastFocusedIframe = null;
        setInterval(function () {
            var currentElement = document.activeElement;
            if (currentElement && currentElement.tagName === 'IFRAME') {
                if (currentElement !== lastFocusedIframe) {
                    lastFocusedIframe = currentElement;
                    document.querySelectorAll('iframe').forEach(function (iframe) {
                        if (iframe !== currentElement) {
                            iframe.src = iframe.src;
                        }
                    });
                }
            } else {
                lastFocusedIframe = null;
            }
        }, 200);
    </script>
</body>
</html>
