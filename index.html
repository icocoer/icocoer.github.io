<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICOCOER — 个人主页</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --accent: #4f6ef7;
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --muted: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 4px 24px rgba(0,0,0,0.08);
            --shadow-hover: 0 8px 32px rgba(79,110,247,0.18);
        }

        body {
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text);
        }

        .hero {
            background: linear-gradient(135deg, #4f6ef7 0%, #a78bfa 100%);
            color: #fff;
            text-align: center;
            padding: 80px 20px 60px;
        }

        .hero-avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.6);
            object-fit: cover;
            margin-bottom: 20px;
        }

        .hero h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .hero p {
            font-size: 1rem;
            opacity: 0.85;
        }

        main {
            flex: 1;
            max-width: 960px;
            width: 100%;
            margin: 0 auto;
            padding: 56px 24px;
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
            margin-bottom: 20px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .nav-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px 24px;
            text-decoration: none;
            color: inherit;
            box-shadow: var(--shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
            border-color: var(--accent);
        }

        .nav-card .card-icon { font-size: 2rem; line-height: 1; }
        .nav-card .card-title { font-size: 1.1rem; font-weight: 600; }
        .nav-card .card-desc { font-size: 0.875rem; color: var(--muted); line-height: 1.5; }
        .nav-card .card-arrow { margin-top: auto; font-size: 0.8rem; color: var(--accent); font-weight: 500; }

        footer {
            text-align: center;
            padding: 24px;
            color: var(--muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
        }

        footer a { color: inherit; }
    </style>
</head>
<body>

    <div class="hero">
        <img class="hero-avatar" src="avatar.jpg" alt="ICOCOER avatar" onerror="this.style.display='none'">
        <h1>ICOCOER</h1>
        <p>代码 · 文字 · 音乐</p>
    </div>

    <main>
        <p class="section-title">导航</p>
        <div class="card-grid">

            <a class="nav-card" href="https://blog.icocoer.top" target="_blank" rel="noopener noreferrer">
                <span class="card-icon">✍️</span>
                <span class="card-title">博客</span>
                <span class="card-desc">我的想法、记录与技术文章。</span>
                <span class="card-arrow">前往博客 →</span>
            </a>

            <a class="nav-card" href="docs.html">
                <span class="card-icon">📚</span>
                <span class="card-title">工具库文档</span>
                <span class="card-desc">我开发的工具库的使用文档与 API 参考。</span>
                <span class="card-arrow">查看文档 →</span>
            </a>

            <a class="nav-card" href="music.html">
                <span class="card-icon">🎵</span>
                <span class="card-title">听点音乐吧</span>
                <span class="card-desc">与音乐死磕，才能与音乐言和。</span>
                <span class="card-arrow">去听音乐 →</span>
            </a>

        </div>
    </main>

    <footer>
        Hosted with ❤️ by ICOCOER &nbsp;·&nbsp;
        <a href="https://github.com/icocoer" target="_blank" rel="noopener noreferrer">GitHub</a>
    </footer>

</body>
</html>
