<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>页面走丢了 - ICOCOER</title>
	<link rel="stylesheet" href="assets/404.css">
</head>
<body>
	<main class="page-shell">
		<section class="error-card">
			<p class="eyebrow">404</p>
			<h1>这个页面可能走丢了，或者它还没被我写出来。</h1>
			<p class="lead">你访问的地址不存在，也可能是我刚调整了目录结构，旧链接还没完全对上。别急，下面这几个入口基本都能把你带回正路。</p>

			<div class="action-row">
				<a class="action-button primary" href="index.html">返回首页</a>
				<a class="action-button secondary" href="views/document/document.html">去文档页</a>
				<a class="action-button secondary" href="views/music/music.html">去音乐页</a>
			</div>

			<div class="hint-grid">
				<article class="hint-card">
					<span class="hint-label">你可能想找</span>
					<h2>文档 / 博客</h2>
					<p>现在技术记录、示例和大部分内容都已经收进文档页了，它基本就是这个站的主入口。</p>
				</article>
				<article class="hint-card">
					<span class="hint-label">或者换条路</span>
					<h2>首页导航</h2>
					<p>如果你是从旧链接跳过来的，先回首页会更稳，那里现在能通往文档页、音乐页和外部链接。</p>
				</article>
			</div>
		</section>
	</main>
</body>
</html>
