<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档 — ICOCOER</title>
    <meta name="description" content="ICOCOER 文档中心，收录技术记录、示例和学习笔记。">
    <meta name="robots" content="index,follow,max-snippet:-1,max-image-preview:large,max-video-preview:-1">
    <meta name="bingbot" content="index,follow,max-snippet:-1,max-image-preview:large,max-video-preview:-1">
    <link rel="canonical" href="https://icocoer.top/views/document/document.html">
    <link rel="icon" href="../../favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="../../assets/images/favicon-32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="../../assets/images/favicon-48.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../../assets/images/apple-touch-icon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <link rel="stylesheet" href="./document.css">
</head>
<body id="app" :class="{ 'sidebar-collapsed': collapsed }">

    <button id="menu-toggle" type="button" aria-label="Toggle menu" @click="mobileOpen = !mobileOpen">☰</button>

    <header id="topbar">
        <div class="brand-area">
            <a class="brand" href="../../index.html">ICOCOER 文档</a>
            <button id="sidebar-collapse" type="button" :aria-label="collapsed ? '展开左侧导航' : '收起左侧导航'" :title="collapsed ? '展开左侧导航' : '收起左侧导航'" @click="collapsed = !collapsed">‹</button>
        </div>
        <div class="doc-search">
            <span class="search-icon">⌕</span>
            <input id="doc-search" type="search" placeholder="搜索文档" autocomplete="off" v-model="searchQuery">
            <kbd>Ctrl</kbd><kbd>K</kbd>
        </div>
        <nav class="top-nav" aria-label="主导航">
            <a href="../../index.html">首页</a>
            <a href="../tools/index.html">工具</a>
            <a href="../music/music.html">音乐</a>
        </nav>
    </header>

    <nav id="sidebar" :class="{ open: mobileOpen }">
        <div class="sidebar-header">
            <div class="sidebar-title">文档目录</div>
            <p class="sidebar-subtitle">按主题浏览所有笔记</p>
        </div>
        <div class="sidebar-nav">
            <p v-if="!manifestLoaded" class="loading">加载目录中…</p>
            <p v-else-if="filteredNav.length === 0" class="nav-empty">没有找到匹配的文档</p>
            <nav-tree v-else :items="filteredNav" :depth="0" :current-doc="currentDocPath"></nav-tree>
        </div>
    </nav>

    <div id="content-wrap">
        <div id="content-grid">
            <article id="markdown-body" v-html="docHtml"></article>

            <aside id="toc-panel">
                <div class="toc-card">
                    <div class="toc-title">此页内容</div>
                    <nav id="toc-nav">
                        <p v-if="tocItems.length === 0" class="toc-empty">{{ loaded ? '当前页没有可用标题' : '' }}</p>
                        <template v-else>
                            <a v-for="heading in tocItems"
                               :key="heading.id"
                               :class="['toc-link', 'toc-level-' + heading.level, { active: heading.id === currentHeadingId }]"
                               :href="'#' + encodeURIComponent(heading.id)"
                               :data-heading="heading.id"
                               @click.prevent="scrollToHeading(heading.id, true)">
                                {{ heading.text }}
                            </a>
                        </template>
                    </nav>
                </div>
            </aside>
        </div>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <script src="../../assets/js/vue.js"></script>
    <script type="module" src="./document.js"></script>
</body>
</html>
