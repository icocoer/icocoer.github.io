<body>
    <div class="page-shell">
        <div class="page-nav">
            <a class="back-link" href="../../index.html">← 返回首页</a>
            <a class="nav-link-pill" href="../document/document.html">文档页</a>
            <a class="nav-link-pill" href="../tools/index.html">工具导航</a>
        </div>

        <header class="hero-card">
            <div class="hero-copy">
                <p class="eyebrow">Music Room</p>
                <h1>留一页给旋律，也留一页给情绪。</h1>
                <p class="subtitle">这里放的是我最近想循环、想记住，或者单纯觉得该留下来的歌。</p>
            </div>

            <div class="hero-note">
                <span class="note-label">当前状态</span>
                <p>与音乐死磕，才能与音乐言和。</p>
                <ul>
                    <li>歌从四方而来</li>
                    <li>心随旋律起舞</li>

                </ul>
